name: Coletar Instagram

on:
  schedule:
    - cron: '0 13 * * *'   # 13h UTC = 10h horário de Brasília (BRT = UTC-3)
  workflow_dispatch:         # Botão para rodar manualmente no GitHub Actions

jobs:
  coletar:
    name: Coletar dados dos concorrentes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install
        working-directory: scripts

      - name: Executar coleta
        run: node coletar-instagram.js
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
